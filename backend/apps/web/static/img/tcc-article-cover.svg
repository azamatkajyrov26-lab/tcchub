<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#1B2A4A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C6A46D"/>
      <stop offset="100%" style="stop-color:#D4B87A"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(198,164,109,0.08)"/>
    </pattern>
    <clipPath id="mapClip">
      <rect x="0" y="0" width="1200" height="500" rx="0"/>
    </clipPath>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <rect width="1200" height="500" fill="url(#grid)"/>
  <!-- Route lines -->
  <g opacity="0.12" stroke="#C6A46D" stroke-width="1.5" fill="none">
    <path d="M200,280 Q400,200 600,250 Q800,300 1000,220"/>
    <path d="M150,320 Q350,260 550,290 Q750,320 950,260"/>
    <path d="M250,350 Q450,280 650,310 Q850,340 1050,280"/>
  </g>
  <!-- Decorative circles (nodes) -->
  <g opacity="0.15">
    <circle cx="300" cy="270" r="6" fill="#C6A46D"/>
    <circle cx="500" cy="260" r="4" fill="#C6A46D"/>
    <circle cx="700" cy="280" r="8" fill="#C6A46D"/>
    <circle cx="900" cy="240" r="5" fill="#C6A46D"/>
    <circle cx="600" cy="300" r="3" fill="#C6A46D"/>
  </g>
  <!-- Gold accent line top -->
  <rect x="80" y="100" width="80" height="3" rx="1.5" fill="url(#gold)"/>
  <!-- Label -->
  <text x="80" y="140" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="800" fill="#C6A46D" letter-spacing="4" text-transform="uppercase">АНАЛИТИЧЕСКИЙ ОБЗОР</text>
  <!-- Title -->
  <text x="80" y="200" font-family="Georgia,serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-1">TransCaspian Cargo</text>
  <!-- Subtitle -->
  <text x="80" y="250" font-family="Arial,Helvetica,sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" font-weight="400">Архитектура решений для логистики Евразии</text>
  <!-- Bottom bar -->
  <rect x="0" y="480" width="1200" height="20" fill="#C6A46D" opacity="0.15"/>
  <!-- TCC logo mark -->
  <g transform="translate(1050, 100)" opacity="0.08">
    <circle cx="50" cy="50" r="60" stroke="#C6A46D" stroke-width="2" fill="none"/>
    <circle cx="50" cy="50" r="40" stroke="#C6A46D" stroke-width="1.5" fill="none"/>
    <circle cx="50" cy="50" r="20" stroke="#C6A46D" stroke-width="1" fill="none"/>
  </g>
</svg>