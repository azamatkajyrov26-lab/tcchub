<table class="w-full text-xs">
    <thead>
        <tr class="text-left">
            <th class="pb-2 text-text-light font-medium">Фактор</th>
            <th class="pb-2 text-text-light font-medium">Кат.</th>
            <th class="pb-2 text-text-light font-medium text-right">Импакт</th>
        </tr>
    </thead>
    <tbody>
        {% for rf in risk_factors %}
        <tr class="border-t" style="border-color:rgba(27,42,74,0.06)">
            <td class="py-1.5 text-navy">{{ rf.title|truncatechars:40 }}</td>
            <td class="py-1.5">
                <span class="px-1.5 py-0.5 rounded text-[9px] font-medium
                    {% if rf.risk_category == 'sanctions' %}bg-red-50 text-red-600
                    {% elif rf.risk_category == 'geopolitical' %}bg-purple-50 text-purple-600
                    {% elif rf.risk_category == 'infrastructure' %}bg-blue-50 text-blue-600
                    {% elif rf.risk_category == 'regulatory' %}bg-amber-50 text-amber-600
                    {% else %}bg-gray-50 text-gray-600{% endif %}">
                    {{ rf.get_risk_category_display }}
                </span>
            </td>
            <td class="py-1.5 text-right font-semibold">{{ rf.impact_score|floatformat:1 }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% if not risk_factors %}
<p class="text-xs text-text-light">Нет активных рисков</p>
{% endif %}
