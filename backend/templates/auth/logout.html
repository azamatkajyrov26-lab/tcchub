{% extends "layouts/auth.html" %}
{% block title %}Выход — TCC HUB{% endblock %}

{% block content %}
<div class="text-center">
    <span class="material-icons-round text-5xl text-primary mb-4">logout</span>
    <h2 class="text-xl font-bold text-white mb-2">Выйти из аккаунта?</h2>
    <p class="text-gray-400 mb-6">Вы уверены, что хотите выйти?</p>
    <form method="post" action="/logout/">
        {% csrf_token %}
        <button type="submit" class="w-full py-3 bg-red-500/10 text-red-400 border border-red-500/20 font-semibold rounded-xl hover:bg-red-500/20 transition">
            Выйти
        </button>
    </form>
    <a href="/dashboard/" class="block mt-3 text-sm text-gray-400 hover:text-white transition">Вернуться назад</a>
</div>
{% endblock %}
