{% extends "layouts/auth.html" %}
{% block title %}Вход — TCC HUB{% endblock %}

{% block content %}
<h2 class="text-xl font-bold text-navy mb-6">Войти в аккаунт</h2>
<form method="post" action="{% url 'login' %}" class="space-y-4">
    {% csrf_token %}
    {% if form_errors %}
    <div class="px-4 py-3 rounded-xl text-sm bg-red-50 text-red-600 border border-red-200 font-medium">
        {{ form_errors }}
    </div>
    {% endif %}
    <div>
        <label for="email" class="block text-sm text-text-mid mb-1.5 font-medium">Email</label>
        <input type="email" name="email" id="email" required value="{{ email|default:'' }}"
               class="w-full px-4 py-3 bg-surface border border-border rounded-xl text-navy placeholder-text-light focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
               placeholder="your@email.com">
    </div>
    <div>
        <label for="password" class="block text-sm text-text-mid mb-1.5 font-medium">Пароль</label>
        <input type="password" name="password" id="password" required
               class="w-full px-4 py-3 bg-surface border border-border rounded-xl text-navy placeholder-text-light focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition"
               placeholder="Введите пароль">
    </div>
    <button type="submit" class="w-full py-3 bg-navy text-white font-bold rounded-xl hover:bg-navy-light transition shadow-sm">
        Войти
    </button>
</form>
<div class="mt-6 text-center text-sm text-text-light">
    Нет аккаунта? <a href="{% url 'register' %}" class="text-primary font-semibold hover:underline">Регистрация</a>
</div>
{% endblock %}
