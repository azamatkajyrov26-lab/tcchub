{% load static %}<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Контент сайта — TCC HUB{% endblock %}</title>
<link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A; --navy-2:#14213D; --gold:#C6A46D; --gold-dim:#9C7F4E;
    --ivory:#FAF8F3; --ink:#0F172A; --line:rgba(27,42,74,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Montserrat',sans-serif;
    background:var(--ivory); color:var(--ink);
    font-size:15px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit; text-decoration:none}

  /* ─── Top nav ─── */
  .topbar{
    background:var(--navy); color:#fff;
    padding:22px 40px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:2px solid var(--gold);
  }
  .topbar .brand{display:flex; align-items:center; gap:14px}
  .topbar .brand-mark{
    width:40px; height:40px; border:1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-weight:900; color:var(--gold); letter-spacing:-1px;
  }
  .topbar .brand-title{font-weight:900; letter-spacing:-.5px; font-size:16px}
  .topbar .brand-sub{
    font-style:italic; color:var(--gold);
    font-weight:300; letter-spacing:3px; font-size:10px; text-transform:uppercase;
  }
  .topbar .top-actions a{
    color:rgba(255,255,255,.6); font-size:11px; letter-spacing:2px;
    text-transform:uppercase; font-weight:500; padding:8px 14px;
    border:1px solid rgba(255,255,255,.1);
  }
  .topbar .top-actions a:hover{border-color:var(--gold); color:var(--gold)}

  /* ─── Shell ─── */
  .shell{max-width:1160px; margin:0 auto; padding:56px 40px 96px}
  .hero-head{
    border-top:1px solid var(--line);
    padding-top:40px; margin-bottom:48px;
    display:flex; align-items:flex-end; justify-content:space-between; gap:32px;
    flex-wrap:wrap;
  }
  .hero-head .eyebrow{
    color:var(--gold); font-size:11px; letter-spacing:4px; text-transform:uppercase;
    font-weight:600; display:inline-flex; align-items:center; gap:12px; margin-bottom:14px;
  }
  .hero-head .eyebrow::before{
    content:""; width:28px; height:2px; background:var(--gold);
  }
  .hero-head h1{
    font-size:48px; font-weight:900; letter-spacing:-1.2px;
    color:var(--navy); margin:0 0 8px;
  }
  .hero-head .subtitle{
    font-style:italic; font-weight:300; color:var(--gold-dim);
    font-size:16px; letter-spacing:.3px;
  }
  .hero-head .subtitle em{color:var(--gold); font-style:italic}

  /* ─── Buttons ─── */
  .btn{
    display:inline-flex; align-items:center; gap:10px;
    padding:14px 26px; font-family:inherit; font-size:11px;
    font-weight:700; text-transform:uppercase; letter-spacing:2px;
    border:none; cursor:pointer; transition:all .2s ease;
  }
  .btn-primary{background:var(--navy); color:var(--gold); border:1px solid var(--navy)}
  .btn-primary:hover{background:var(--gold); color:var(--navy); border-color:var(--gold)}
  .btn-outline{background:transparent; color:var(--navy); border:1px solid var(--navy)}
  .btn-outline:hover{background:var(--navy); color:var(--gold)}
  .btn-ghost{background:transparent; color:var(--navy); border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--navy)}
  .btn-danger{background:transparent; color:#b91c1c; border:1px solid rgba(185,28,28,.3)}
  .btn-danger:hover{background:#b91c1c; color:#fff; border-color:#b91c1c}
  .btn-sm{padding:8px 14px; font-size:10px; letter-spacing:1.5px}

  /* ─── Block cards ─── */
  .blocks{display:flex; flex-direction:column; gap:24px}
  .block-card{
    background:#fff; border:1px solid var(--line);
    display:grid; grid-template-columns:72px 1fr auto; align-items:stretch;
    position:relative;
    transition:border-color .2s ease;
  }
  .block-card:hover{border-color:var(--navy)}
  .block-card.hidden-block{opacity:.55}
  .block-card.hidden-block::after{
    content:"HIDDEN"; position:absolute; top:14px; right:14px;
    font-size:9px; letter-spacing:2px; font-weight:700;
    color:var(--gold-dim); border:1px solid var(--gold-dim); padding:3px 8px;
  }

  .block-num{
    background:var(--navy); color:var(--gold);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Montserrat',monospace; gap:6px;
    border-right:1px solid var(--gold);
  }
  .block-num .n{font-size:22px; font-weight:900; letter-spacing:-1px}
  .block-num .arrows{display:flex; flex-direction:column; gap:2px}
  .block-num .arrows button{
    background:transparent; border:none; color:rgba(198,164,109,.5);
    cursor:pointer; font-size:10px; padding:2px 6px;
  }
  .block-num .arrows button:hover{color:var(--gold)}
  .block-num form{margin:0}

  .block-body{padding:26px 32px}
  .block-type{
    font-size:10px; letter-spacing:3px; text-transform:uppercase;
    color:var(--gold); font-weight:700; margin-bottom:8px;
    display:inline-flex; align-items:center; gap:10px;
  }
  .block-type::before{content:""; width:18px; height:1px; background:var(--gold)}
  .block-heading{
    font-size:20px; font-weight:700; color:var(--navy);
    margin:0 0 6px; letter-spacing:-.3px;
  }
  .block-sub{
    color:#64748b; font-size:13px; line-height:1.55;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .non-editable{
    margin-top:10px; font-size:10px; letter-spacing:1.5px;
    color:var(--gold-dim); font-style:italic;
  }

  .block-actions{
    border-left:1px solid var(--line);
    display:flex; flex-direction:column; justify-content:center;
    padding:22px 26px; gap:8px;
  }
  .block-actions form{margin:0}
  .block-actions .btn{justify-content:center; min-width:140px}

  /* ─── Empty state ─── */
  .empty{
    text-align:center; padding:96px 24px;
    border:1px solid var(--line); background:#fff;
  }
  .empty .eyebrow{
    color:var(--gold); font-size:11px; letter-spacing:4px; text-transform:uppercase;
    font-weight:600; margin-bottom:18px;
  }
  .empty h2{font-size:32px; color:var(--navy); font-weight:900; letter-spacing:-1px; margin:0 0 6px}
  .empty .italic{font-style:italic; font-weight:300; color:var(--gold); margin-bottom:28px}

  /* ─── Form ─── */
  .form-shell{
    background:#fff; border:1px solid var(--line);
    padding:48px 56px; max-width:820px;
  }
  .form-row{margin-bottom:26px}
  .form-row label{
    display:block; font-size:10px; letter-spacing:2.5px;
    text-transform:uppercase; color:var(--gold); font-weight:700;
    margin-bottom:10px;
  }
  .form-row input[type=text], .form-row input[type=url],
  .form-row textarea, .form-row select{
    width:100%; padding:12px 0 10px; background:transparent;
    border:none; border-bottom:1px solid var(--line);
    font-family:inherit; font-size:16px; color:var(--navy);
    transition:border-color .2s ease;
  }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus{
    outline:none; border-bottom-color:var(--gold);
  }
  .form-row textarea{min-height:140px; resize:vertical; line-height:1.55}
  .form-row .hint{
    font-size:11px; color:#94a3b8; margin-top:8px;
    font-style:italic;
  }
  .form-grid-2{display:grid; grid-template-columns:1fr 1fr; gap:28px}
  .form-actions{
    display:flex; gap:14px; padding-top:26px;
    border-top:1px solid var(--line); margin-top:36px;
  }

  /* ─── Create picker ─── */
  .type-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:18px;
  }
  .type-card{
    background:#fff; border:1px solid var(--line);
    padding:28px 24px; cursor:pointer; transition:all .2s ease;
    text-align:left;
  }
  .type-card:hover{border-color:var(--navy); transform:translateY(-2px)}
  .type-card .num{
    font-size:11px; letter-spacing:3px; color:var(--gold);
    font-weight:700; margin-bottom:12px;
  }
  .type-card .t-name{
    font-size:16px; font-weight:700; color:var(--navy); margin:0;
  }
  .type-card .t-hint{
    font-size:11px; color:#94a3b8; margin-top:6px; font-style:italic;
  }
  .type-card button{
    all:unset; display:block; width:100%; cursor:pointer;
  }

  @media(max-width:780px){
    .shell{padding:36px 20px 60px}
    .hero-head h1{font-size:32px}
    .block-card{grid-template-columns:56px 1fr; }
    .block-actions{grid-column:1/-1; border-left:none; border-top:1px solid var(--line); flex-direction:row; padding:14px 20px; flex-wrap:wrap}
    .form-shell{padding:32px 24px}
    .form-grid-2{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-mark">T</div>
    <div>
      <div class="brand-title">TCC HUB</div>
      <div class="brand-sub">Content · Admin</div>
    </div>
  </div>
  <div class="top-actions">
    <a href="/">На сайт</a>
  </div>
</div>
<main class="shell">
  {% block content %}{% endblock %}
</main>
</body>
</html>
