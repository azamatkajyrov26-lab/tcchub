upstream django {
    server backend:8000;
}

# HTTP — ACME + redirect to HTTPS
server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health (HTTP, no redirect)
    location /health { access_log off; return 200 "OK"; add_header Content-Type text/plain; }

    # Redirect everything else to HTTPS (only when cert exists; otherwise serve normally)
    location / {
        # If cert is missing, comment out next line and uncomment proxy_pass below.
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name 89.207.255.107.sslip.io _;

    ssl_certificate     /etc/letsencrypt/live/89.207.255.107.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/89.207.255.107.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
