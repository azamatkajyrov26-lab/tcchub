{% with is_mine=msg.sender.id|stringformat:"s" %}
<div class="flex {% if msg.sender.id == request.user.id %}justify-end{% else %}justify-start{% endif %} mb-3">
    <div class="max-w-[75%] {% if msg.sender.id == request.user.id %}bg-navy text-white rounded-2xl rounded-br-sm{% else %}bg-surface text-navy rounded-2xl rounded-bl-sm border border-border{% endif %} px-4 py-2.5">
        {% if msg.sender.id != request.user.id %}
            <p class="text-xs font-semibold text-primary mb-1">{{ msg.sender.get_full_name|default:msg.sender.username }}</p>
        {% endif %}
        <p class="text-sm leading-relaxed">{{ msg.content }}</p>
        <p class="text-xs mt-1.5 {% if msg.sender.id == request.user.id %}text-white/50{% else %}text-text-light{% endif %}">
            {{ msg.created_at|date:"H:i" }}
        </p>
    </div>
</div>
{% endwith %}
